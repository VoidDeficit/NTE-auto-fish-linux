version: 37
jobs:
- name: Build Linux AppImage
  jobExecutor: docker-linux
  steps:
  - !CheckoutStep
    name: Checkout
    cloneCredential: !DefaultCredential {}
    withLfs: false
    condition: ALWAYS
  - !CommandStep
    name: Build
    runInContainer: true
    image: archlinux:base-devel
    interpreter: !DefaultInterpreter
      commands: |
        set -e

        # ── Bootstrap pacman ────────────────────────────────────────────
        pacman-key --init
        pacman-key --populate archlinux
        pacman -Syu --noconfirm

        # ── System dependencies ─────────────────────────────────────────
        pacman -S --noconfirm \
          python python-pip python-gobject \
          gobject-introspection \
          gstreamer gst-plugins-base gst-plugins-good \
          pipewire gst-plugin-pipewire \
          libxtst xdotool \
          fuse2 wget imagemagick

        # ── Python dependencies ─────────────────────────────────────────
        python -m venv --system-site-packages /opt/venv
        /opt/venv/bin/pip install \
          opencv-python-headless numpy dearpygui pynput jeepney \
          keyboard pyinstaller flask screeninfo

        # ── PyInstaller ─────────────────────────────────────────────────
        /opt/venv/bin/pyinstaller --noconfirm --onedir \
          --collect-all gi \
          --collect-all dearpygui \
          --collect-all flask \
          --collect-all werkzeug \
          --hidden-import jeepney \
          --hidden-import jeepney.io.blocking \
          --hidden-import pynput.keyboard._xorg \
          --hidden-import pynput.mouse._xorg \
          --hidden-import flask \
          --hidden-import werkzeug \
          --hidden-import screeninfo \
          --add-data "templates:templates" \
          --add-data "gui:gui" \
          --add-data "modules:modules" \
          --exclude-module tkinter \
          --exclude-module test \
          --exclude-module unittest \
          --name NTE-Auto-Fish \
          start_gui.py

        # ── Bundle GStreamer typelibs ────────────────────────────────────
        mkdir -p dist/NTE-Auto-Fish/girepository-1.0
        for typelib in Gst-1.0 GstBase-1.0 GstPbutils-1.0 GstApp-1.0 \
                       GLib-2.0 GObject-2.0 GModule-2.0 Gio-2.0; do
          find /usr/lib -name "${typelib}.typelib" 2>/dev/null | head -1 | \
            xargs -I{} cp {} dist/NTE-Auto-Fish/girepository-1.0/ || true
        done

        # ── Strip system .so files ──────────────────────────────────────
        find dist/NTE-Auto-Fish -name "libglib-*.so*"         -delete
        find dist/NTE-Auto-Fish -name "libgobject-*.so*"      -delete
        find dist/NTE-Auto-Fish -name "libgmodule-*.so*"      -delete
        find dist/NTE-Auto-Fish -name "libgio-*.so*"          -delete
        find dist/NTE-Auto-Fish -name "libgstreamer-*.so*"    -delete
        find dist/NTE-Auto-Fish -name "libgst*.so*"           -delete
        find dist/NTE-Auto-Fish -name "libgirepository-*.so*" -delete
        find dist/NTE-Auto-Fish -name "libffi*.so*"           -delete
        find dist/NTE-Auto-Fish -name "libpcre*.so*"          -delete
        find dist/NTE-Auto-Fish -name "libmount.so*"          -delete
        find dist/NTE-Auto-Fish -name "libblkid.so*"          -delete
        find dist/NTE-Auto-Fish -name "libselinux.so*"        -delete
        find dist/NTE-Auto-Fish -name "libz.so*"              -delete
        find dist/NTE-Auto-Fish -name "libzstd.so*"           -delete

        # ── AppDir structure ────────────────────────────────────────────
        UPSTREAM=$(cat version.txt | tr -d '[:space:]')
        LINUX=$(cat version-linux.txt | tr -d '[:space:]')
        APPIMAGE="NTE-Auto-Fish-v${UPSTREAM}-linux.v${LINUX}-x86_64.AppImage"

        mkdir -p AppDir/usr/bin
        cp -r dist/NTE-Auto-Fish AppDir/usr/bin/NTE-Auto-Fish-bundle

        cat > AppDir/AppRun << 'APPRUN'
        #!/bin/bash
        HERE="$(dirname "$(readlink -f "$0")")"
        BUNDLE="$HERE/usr/bin/NTE-Auto-Fish-bundle"
        export GI_TYPELIB_PATH="$BUNDLE/girepository-1.0${GI_TYPELIB_PATH:+:$GI_TYPELIB_PATH}"
        exec "$BUNDLE/NTE-Auto-Fish" "$@@"
        APPRUN
        chmod +x AppDir/AppRun

        cat > AppDir/NTE-Auto-Fish.desktop << 'DESKTOP'
        [Desktop Entry]
        Name=NTE Auto Fish
        Exec=NTE-Auto-Fish
        Icon=NTE-Auto-Fish
        Type=Application
        Categories=Game;Utility;
        DESKTOP

        convert -size 256x256 xc:#1a1a2e -fill white \
          -font DejaVu-Sans -pointsize 48 -gravity center \
          -annotate 0 "NTE" AppDir/NTE-Auto-Fish.png 2>/dev/null || \
          touch AppDir/NTE-Auto-Fish.png

        # ── Build AppImage ──────────────────────────────────────────────
        wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        ARCH=x86_64 ./appimagetool-x86_64.AppImage \
          --appimage-extract-and-run \
          AppDir \
          "$APPIMAGE"
    useTTY: false
    condition: ALWAYS
  - !PublishArtifactStep
    name: Publish AppImage
    artifacts: "*.AppImage"
    condition: ALWAYS
  triggers:
  - !TagCreateTrigger
    tags: v*-linux.*
  - !BranchUpdateTrigger
    branches: linux-wayland-support
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 3600

- name: Build Windows EXE
  jobExecutor: docker-linux
  steps:
  - !CheckoutStep
    name: Checkout
    cloneCredential: !DefaultCredential {}
    withLfs: false
    condition: ALWAYS
  - !CommandStep
    name: Build
    runInContainer: false
    interpreter: !DefaultInterpreter
      commands: |
        set -e

        # ── Shared storage between host and dockur/windows VM ───────────────
        STORAGE="$(pwd)/win-storage"
        mkdir -p "$STORAGE/oem" "$STORAGE/source" "$STORAGE/output"

        # ── Copy project source into Windows-accessible storage ─────────────
        cp -r templates/ modules/ gui/ start_gui.py config.py "$STORAGE/source/"

        # ── Windows build script (dockur/windows runs /storage/oem/*.cmd) ───
        cat > "$STORAGE/oem/setupComplete.cmd" << 'WINCMD'
        @echo off
        setlocal EnableDelayedExpansion

        powershell -ExecutionPolicy Bypass -Command "Invoke-WebRequest -Uri 'https://www.python.org/ftp/python/3.11.9/python-3.11.9-amd64.exe' -OutFile 'C:\py.exe'"
        C:\py.exe /quiet InstallAllUsers=1 PrependPath=1 Include_test=0
        timeout /t 60 /nobreak > nul
        del C:\py.exe

        set "PY=C:\Program Files\Python311\python.exe"
        if not exist "%PY%" set "PY=C:\Python311\python.exe"

        "%PY%" -m pip install --upgrade pip
        "%PY%" -m pip install pyinstaller flask werkzeug opencv-python-headless numpy dearpygui keyboard screeninfo mss pydirectinput

        xcopy /e /i /q /y "E:\source" "C:\nte\"
        cd /d C:\nte
        "%PY%" -m PyInstaller --noconfirm --onefile --windowed --icon=NONE "--add-data=templates;templates" "--add-data=gui;gui" "--add-data=modules;modules" "--collect-all=flask" "--collect-all=werkzeug" "--hidden-import=flask" "--hidden-import=werkzeug" "--exclude-module=tkinter" "--exclude-module=unittest" --name NTE-Auto-Fish start_gui.py

        if exist "dist\NTE-Auto-Fish.exe" (
          copy /y "dist\NTE-Auto-Fish.exe" "E:\output\NTE-Auto-Fish.exe"
          echo SUCCESS > "E:\output\status.txt"
        ) else (
          echo FAILED > "E:\output\status.txt"
        )
        WINCMD

        # ── Launch Windows VM ───────────────────────────────────────────────
        CONTAINER="nte-win-$$"
        docker run -d --name "$CONTAINER" --privileged --device /dev/kvm \
          -e VERSION="tiny11" \
          -e RAM_SIZE="4G" \
          -e CPU_CORES="4" \
          -v "$STORAGE:/storage" \
          dockur/windows

        echo "Windows container $CONTAINER started."
        echo "First run: Windows installs, then the build script runs (~30-90 min)."

        # ── Poll for completion ─────────────────────────────────────────────
        TIMEOUT=5400
        ELAPSED=0
        while [ ! -f "$STORAGE/output/status.txt" ]; do
          sleep 60
          ELAPSED=$((ELAPSED + 60))
          echo "Waiting... ${ELAPSED}s / ${TIMEOUT}s"
          if ! docker inspect "$CONTAINER" > /dev/null 2>&1; then
            echo "Container exited unexpectedly"; exit 1
          fi
          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm  "$CONTAINER" 2>/dev/null || true
            echo "Timed out after ${TIMEOUT}s"; exit 1
          fi
        done

        # ── Collect artifact ────────────────────────────────────────────────
        if grep -q SUCCESS "$STORAGE/output/status.txt"; then
          cp "$STORAGE/output/NTE-Auto-Fish.exe" ./
          echo "Build successful!"
        else
          echo "Build FAILED (check Windows logs)"
          docker stop "$CONTAINER" 2>/dev/null || true
          docker rm  "$CONTAINER" 2>/dev/null || true
          exit 1
        fi

        docker stop "$CONTAINER" 2>/dev/null || true
        docker rm  "$CONTAINER" 2>/dev/null || true
    useTTY: false
    condition: ALWAYS
  - !PublishArtifactStep
    name: Publish EXE
    artifacts: "*.exe"
    condition: ALWAYS
  triggers:
  - !TagCreateTrigger
    tags: v*
  - !BranchUpdateTrigger
    branches: main
  retryCondition: never
  maxRetries: 1
  retryDelay: 30
  timeout: 7200
