name: Build Executable

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ── Linux (Wayland / KDE / CachyOS) ───────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install system build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev python3-pip \
          libgirepository1.0-dev gobject-introspection \
          gstreamer1.0-tools gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
          gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
          libcairo2-dev pkg-config \
          libxtst-dev libxdo-dev \
          fuse libfuse2

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements-linux.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir \
          --collect-all gi \
          --collect-all dearpygui \
          --hidden-import jeepney \
          --hidden-import jeepney.io.blocking \
          --hidden-import pyautogui \
          --add-data "templates:templates" \
          --add-data "gui:gui" \
          --add-data "modules:modules" \
          --exclude-module tkinter \
          --exclude-module test \
          --exclude-module unittest \
          --name NTE-Auto-Fish \
          start_gui.py

    - name: Bundle GStreamer typelibs
      # Typelibs are small metadata files — bundling them means gi works
      # without needing the exact same GStreamer version installed.
      # The actual .so libs are intentionally left to the system (PipeWire
      # integration requires the running system's GStreamer/PipeWire stack).
      run: |
        mkdir -p dist/NTE-Auto-Fish/girepository-1.0
        for typelib in Gst-1.0 GstBase-1.0 GstPbutils-1.0 GstApp-1.0 \
                       GLib-2.0 GObject-2.0 GModule-2.0 Gio-2.0; do
          find /usr/lib -name "${typelib}.typelib" 2>/dev/null | head -1 | \
            xargs -I{} cp {} dist/NTE-Auto-Fish/girepository-1.0/ || true
        done

    - name: Create AppDir structure
      run: |
        mkdir -p AppDir/usr/bin
        cp -r dist/NTE-Auto-Fish AppDir/usr/bin/NTE-Auto-Fish-bundle

        # AppRun: sets up paths so gi finds bundled typelibs, then launches
        cat > AppDir/AppRun << 'EOF'
        #!/bin/bash
        HERE="$(dirname "$(readlink -f "$0")")"
        BUNDLE="$HERE/usr/bin/NTE-Auto-Fish-bundle"

        # Prepend bundled typelibs; fall back to system ones for any missing
        export GI_TYPELIB_PATH="$BUNDLE/girepository-1.0${GI_TYPELIB_PATH:+:$GI_TYPELIB_PATH}"

        # Bundled Python libs first, then system (so system GStreamer .so wins)
        export LD_LIBRARY_PATH="$BUNDLE${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

        exec "$BUNDLE/NTE-Auto-Fish" "$@"
        EOF
        chmod +x AppDir/AppRun

        cat > AppDir/NTE-Auto-Fish.desktop << 'EOF'
        [Desktop Entry]
        Name=NTE Auto Fish
        Exec=NTE-Auto-Fish
        Icon=NTE-Auto-Fish
        Type=Application
        Categories=Game;Utility;
        EOF

        # Minimal placeholder icon (appimagetool requires one)
        convert -size 256x256 xc:#1a1a2e -fill white \
          -font DejaVu-Sans -pointsize 48 -gravity center \
          -annotate 0 "NTE" AppDir/NTE-Auto-Fish.png 2>/dev/null || \
          touch AppDir/NTE-Auto-Fish.png

    - name: Download appimagetool and build AppImage
      run: |
        wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        ARCH=x86_64 ./appimagetool-x86_64.AppImage \
          --appimage-extract-and-run \
          AppDir \
          NTE-Auto-Fish-x86_64.AppImage

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: NTE-Auto-Fish-Linux-x86_64
        path: NTE-Auto-Fish-x86_64.AppImage

    - name: Add to GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: NTE-Auto-Fish-x86_64.AppImage
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
