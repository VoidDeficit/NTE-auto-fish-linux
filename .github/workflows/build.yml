name: Build Executable

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build GUI (single EXE)
      shell: bash
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon=NONE \
          --exclude-module tkinter \
          --exclude-module unittest \
          --exclude-module test \
          --exclude-module email \
          --exclude-module http \
          --exclude-module xml \
          --exclude-module pydoc \
          --exclude-module multiprocessing \
          --exclude-module asyncio \
          --exclude-module sqlite3 \
          --exclude-module lib2to3 \
          --exclude-module distutils \
          --exclude-module setuptools \
          --exclude-module _decimal \
          --exclude-module _lzma \
          --exclude-module _bz2 \
          --name NTE-Auto-Fish \
          start_gui.py

    - name: Build CLI (single EXE)
      shell: bash
      run: |
        pyinstaller --noconfirm --onefile --console --icon=NONE \
          --exclude-module tkinter \
          --exclude-module unittest \
          --exclude-module test \
          --exclude-module email \
          --exclude-module http \
          --exclude-module xml \
          --exclude-module pydoc \
          --exclude-module multiprocessing \
          --exclude-module asyncio \
          --exclude-module sqlite3 \
          --exclude-module lib2to3 \
          --exclude-module distutils \
          --exclude-module setuptools \
          --exclude-module _decimal \
          --exclude-module _lzma \
          --exclude-module _bz2 \
          --exclude-module dearpygui \
          --name NTE-Auto-Fish-CLI \
          main.py

    - name: Upload GUI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NTE-Auto-Fish-GUI-Windows
        path: dist/NTE-Auto-Fish.exe

    - name: Upload CLI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NTE-Auto-Fish-CLI-Windows
        path: dist/NTE-Auto-Fish-CLI.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/NTE-Auto-Fish.exe
          dist/NTE-Auto-Fish-CLI.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
