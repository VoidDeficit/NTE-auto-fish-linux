name: Release and Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: simple
          version-file: version.txt

  build:
    runs-on: windows-latest
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/') || github.event_name != 'push' || needs.release-please.outputs.release_created == 'true')
    needs: [release-please]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Run tests
      run: python -m unittest discover -s tests -v

    - name: Build GUI (single EXE)
      shell: bash
      run: |
        VERSION=$(cat version.txt)
        FILENAME="NTE-Auto-Fish-v${VERSION}-Windows-x64.exe"
        echo "FILENAME=$FILENAME" >> $GITHUB_ENV
        
        pyinstaller --noconfirm --onefile --windowed --icon=NONE \
          --uac-admin \
          --add-data "templates;templates" \
          --add-data "version.txt;." \
          --exclude-module tkinter \
          --exclude-module unittest \
          --exclude-module test \
          --exclude-module email \
          --exclude-module http \
          --exclude-module xml \
          --exclude-module pydoc \
          --exclude-module multiprocessing \
          --exclude-module asyncio \
          --exclude-module sqlite3 \
          --exclude-module lib2to3 \
          --exclude-module distutils \
          --exclude-module setuptools \
          --exclude-module _decimal \
          --exclude-module _lzma \
          --exclude-module _bz2 \
          --name "NTE-Auto-Fish" \
          start_gui.py
        
        mv "dist/NTE-Auto-Fish.exe" "dist/$FILENAME"

    - name: Package CLI source
      shell: pwsh
      run: |
        $version = Get-Content version.txt -Raw
        $version = $version.Trim()
        $cliFilename = "NTE-Auto-Fish-v$version-CLI.zip"
        echo "CLI_FILENAME=$cliFilename" >> $env:GITHUB_ENV
        
        New-Item -ItemType Directory -Force -Path dist/cli-package/modules, dist/cli-package/templates | Out-Null
        Copy-Item main.py, config.py, requirements.txt, run.bat, version.txt dist/cli-package/
        Copy-Item modules/* dist/cli-package/modules/
        Copy-Item templates/* dist/cli-package/templates/
        Compress-Archive -Path dist/cli-package/* -DestinationPath "dist/$cliFilename"

    - name: Upload GUI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NTE-Auto-Fish-GUI-Windows
        path: dist/${{ env.FILENAME }}

    - name: Upload CLI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NTE-Auto-Fish-CLI-Windows
        path: dist/${{ env.CLI_FILENAME }}

    - name: Upload Release Artifacts
      if: needs.release-please.outputs.release_created == 'true' || startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.release-please.outputs.tag_name || github.ref_name }}
        files: |
          dist/${{ env.FILENAME }}
          dist/${{ env.CLI_FILENAME }}
